<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Organizer">
<meta name="theme-color" content="#0a0a0c" id="themeColor">
<title>Organizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root, :root[data-theme="dark"] {
    --bg: #0a0a0c;
    --surface: #15161a;
    --surface-2: #1f2127;
    --border: #2a2d35;
    --text: #ecedf0;
    --text-dim: #8a8d96;
    --text-faint: #5a5d66;
  }
  :root[data-theme="light"] {
    --bg: #f5f7fa;
    --surface: #ffffff;
    --surface-2: #f0f2f5;
    --border: #dfe3e8;
    --text: #15161a;
    --text-dim: #5a5d66;
    --text-faint: #8a8d96;
  }
  @media (prefers-color-scheme: light) {
    :root[data-theme="auto"] {
      --bg: #f5f7fa;
      --surface: #ffffff;
      --surface-2: #f0f2f5;
      --border: #dfe3e8;
      --text: #15161a;
      --text-dim: #5a5d66;
      --text-faint: #8a8d96;
    }
  }
  @media (prefers-color-scheme: dark) {
    :root[data-theme="auto"] {
      --bg: #0a0a0c;
      --surface: #15161a;
      --surface-2: #1f2127;
      --border: #2a2d35;
      --text: #ecedf0;
      --text-dim: #8a8d96;
      --text-faint: #5a5d66;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { min-height: 100%; }
  body {
    font-family: 'Manrope', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    transition: background 0.2s, color 0.2s;
  }
  .container { max-width: 600px; margin: 0 auto; padding: 28px 20px 40px; }

  header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 36px; }
  .brand { font-size: 14px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim); }
  .theme-switch { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 3px; }
  .theme-switch button { background: transparent; border: none; color: var(--text-dim); padding: 6px 10px; border-radius: 7px; font-family: inherit; font-size: 12px; cursor: pointer; }
  .theme-switch button.active { background: var(--surface-2); color: var(--text); }

  .apps { display: flex; flex-direction: column; gap: 14px; }
  .app-card {
    display: block;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px 24px;
    text-decoration: none;
    color: var(--text);
    transition: transform 0.15s, border-color 0.15s;
    position: relative;
    overflow: hidden;
  }
  .app-card:active { transform: scale(0.98); }
  .app-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
    background: var(--card-color);
  }
  .app-card.plan { --card-color: #94a3b8; }
  .app-card.fuel { --card-color: #10b981; }
  .app-card.train { --card-color: #f97316; }
  .app-card.money { --card-color: #a855f7; }
  .app-card.edu { --card-color: #a855f7; }
  .app-card .title { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; }
  .app-card .arrow { position: absolute; top: 50%; right: 24px; transform: translateY(-50%); color: var(--text-faint); font-size: 24px; opacity: 0.5; }

  @media (max-width: 380px) {
    .container { padding: 20px 14px 30px; }
    .app-card { padding: 22px 18px; }
    .app-card .title { font-size: 21px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="brand">Organizer</div>
    <div class="theme-switch">
      <button data-theme="auto" title="Automatisch">A</button>
      <button data-theme="light" title="Hell">☀</button>
      <button data-theme="dark" title="Dunkel">🌙</button>
    </div>
  </header>

  <div class="apps">
    <a href="terminplaner.html" class="app-card plan">
      <div class="arrow">›</div>
      <div class="title">Plan</div>
    </a>

    <a href="fuel.html" class="app-card fuel">
      <div class="arrow">›</div>
      <div class="title">Fuel</div>
    </a>

    <a href="train.html" class="app-card train">
      <div class="arrow">›</div>
      <div class="title">Train</div>
    </a>

    <a href="haushaltsbuch.html" class="app-card money">
      <div class="arrow">›</div>
      <div class="title">Budget</div>
    </a>

    <a href="education.html" class="app-card edu">
      <div class="arrow">›</div>
      <div class="title">Education</div>
    </a>
  </div>
</div>

<script>
  const THEME_KEY = 'apps_home_theme';
  let theme = localStorage.getItem(THEME_KEY) || 'auto';
  function applyTheme() {
    document.documentElement.setAttribute('data-theme', theme);
    const isDark = theme === 'dark' || (theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
    document.getElementById('themeColor').setAttribute('content', isDark ? '#0a0a0c' : '#f5f7fa');
    document.querySelectorAll('.theme-switch button').forEach(b => b.classList.toggle('active', b.dataset.theme === theme));
  }
  document.querySelectorAll('.theme-switch button').forEach(b => {
    b.addEventListener('click', () => {
      theme = b.dataset.theme;
      localStorage.setItem(THEME_KEY, theme);
      applyTheme();
    });
  });
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
    if (theme === 'auto') applyTheme();
  });
  applyTheme();
</script>
</body>
</html>
