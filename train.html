<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Train">
<meta name="theme-color" content="#000000" id="themeColor">
<title>Train – Krav Maga & Krafttraining</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Antonio:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* ============ THEMES ============ */
  :root, :root[data-theme="dark"] {
    --bg: #000000;
    --surface: #14110a;
    --surface-2: #221a0d;
    --border: #3a2d12;
    --text: #ffcc99;
    --text-dim: #cc99cc;
    --text-faint: #9999ff;
    --accent: #ff7755;
    --accent-dim: rgba(255,119,85,0.18);
    --orange: #ff9c00;
    --green: #99cc99;
    --blue: #9999ff;
    --purple: #cc99cc;
  }
  :root[data-theme="light"] {
    --bg: #d6d2c4;
    --surface: #c8c2b0;
    --surface-2: #bdb6a2;
    --border: #a89f88;
    --text: #1a1a1a;
    --text-dim: #5a4a2a;
    --text-faint: #7a6a45;
    --accent: #cc4422;
    --accent-dim: rgba(204,68,34,0.12);
    --orange: #cc6600;
    --green: #4a7a4a;
    --blue: #4444aa;
    --purple: #8a4a8a;
  }
  @media (prefers-color-scheme: light) {
    :root[data-theme="auto"] {
      --bg: #d6d2c4;
      --surface: #c8c2b0;
      --surface-2: #bdb6a2;
      --border: #a89f88;
      --text: #1a1a1a;
      --text-dim: #5a4a2a;
      --text-faint: #7a6a45;
      --accent: #cc4422;
      --accent-dim: rgba(204,68,34,0.12);
      --orange: #cc6600;
      --green: #4a7a4a;
      --blue: #4444aa;
      --purple: #8a4a8a;
    }
  }
  :root {
    --safe-top: env(safe-area-inset-top);
    --safe-bot: env(safe-area-inset-bottom);
    --lcars-orange:#ff9c00; --lcars-peach:#ff9966; --lcars-lilac:#cc99cc; --lcars-blue:#9999ff; --lcars-ice:#99ccff; --lcars-gold:#ffcc66; --lcars-salmon:#ff7755;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: 'Antonio', 'Arial Narrow', sans-serif; background: var(--bg); color: var(--text); font-size: 16px; line-height: 1.4; overscroll-behavior: none; transition: background 0.2s, color 0.2s; text-transform: uppercase; letter-spacing: 0.03em; }

  /* ============ LCARS-RAHMEN ============ */
  .app {
    display: grid;
    grid-template-columns: 116px 1fr;
    grid-template-rows: 56px 1fr 30px;
    column-gap: 6px; row-gap: 6px;
    height: 100vh; height: 100dvh;
    padding: var(--safe-top) 8px calc(74px + var(--safe-bot)) 8px;
    background: var(--bg);
  }
  @media (max-width: 440px) { .app { grid-template-columns: 78px 1fr; } }

  .lcars-top { grid-column: 1 / 3; grid-row: 1; display: flex; gap: 6px; align-items: stretch; }
  .lcars-top .elbow { width: 116px; flex-shrink: 0; background: var(--lcars-orange); border-top-left-radius: 50px; }
  .lcars-top .bars { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; gap: 5px; }
  .lcars-top .tics { display: flex; gap: 6px; height: 14px; }
  .lcars-top .tics span { display: block; height: 14px; border-radius: 999px; }
  .lcars-top .bar { height: 26px; background: var(--lcars-lilac); border-radius: 0 999px 999px 0; display: flex; align-items: center; justify-content: flex-end; padding-right: 16px; color: #000; font-weight: 700; font-size: 13px; }
  @media (max-width: 440px) { .lcars-top .elbow { width: 78px; } }

  .lcars-rail { grid-column: 1; grid-row: 2; display: flex; flex-direction: column; gap: 6px; overflow: hidden; }
  .lcars-rail .rblock { color: #000; font-weight: 700; font-size: 11px; padding: 9px 9px; display: flex; flex-direction: column; align-items: flex-end; justify-content: flex-end; text-align: right; line-height: 1; min-height: 46px; }
  .lcars-rail .r1 { background: var(--lcars-salmon); min-height: 64px; }
  .lcars-rail .r2 { background: var(--lcars-peach); }
  .lcars-rail .r3 { background: var(--lcars-gold); }
  .lcars-rail .r4 { background: var(--lcars-blue); }
  .lcars-rail .rfill { flex: 1; background: var(--lcars-lilac); min-height: 24px; display: flex; align-items: flex-start; justify-content: flex-end; padding: 9px; color: #000; font-weight: 700; font-size: 11px; text-align: right; line-height: 1.1; }

  .lcars-bot { grid-column: 1 / 3; grid-row: 3; display: flex; gap: 6px; align-items: stretch; }
  .lcars-bot .elbow { width: 116px; flex-shrink: 0; background: var(--lcars-orange); border-bottom-left-radius: 50px; }
  .lcars-bot .bar { flex: 1; height: 100%; background: var(--lcars-blue); border-radius: 0 999px 999px 0; display: flex; align-items: center; padding-left: 16px; color: #000; font-weight: 700; font-size: 12px; }
  @media (max-width: 440px) { .lcars-bot .elbow { width: 78px; } }

  .lcars-content { grid-column: 2; grid-row: 2; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }

  header { padding: 4px 8px 8px; display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-shrink: 0; }
  .home-link { background: var(--lcars-orange); border: none; color: #000; width: 46px; height: 38px; border-radius: 999px; font-size: 22px; font-weight: 700; cursor: pointer; display: grid; place-items: center; text-decoration: none; line-height: 1; padding-bottom: 2px; }
  .home-link:active { opacity: 0.8; }
  .title { font-weight: 700; font-size: 26px; letter-spacing: 0.02em; text-transform: uppercase; color: var(--lcars-orange); flex: 1; padding-left: 4px; }
  .title .accent { color: var(--lcars-ice); }
  .header-btn { background: var(--lcars-gold); border: none; color: #000; min-width: 52px; height: 38px; padding: 0 14px; border-radius: 999px; font-size: 13px; cursor: pointer; display: grid; place-items: center; font-weight: 700; letter-spacing: 0.04em; }

  main { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 20px; min-height: 0; }

  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 2px solid var(--lcars-orange); display: flex; padding: 8px 4px calc(8px + var(--safe-bot)); z-index: 50; }
  .nav-btn { flex: 1; background: transparent; border: none; color: var(--text-faint); padding: 8px 2px; cursor: pointer; font-family: inherit; font-size: 11px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 5px; text-transform: uppercase; letter-spacing: 0.04em; }
  .nav-btn .icon { width: 28px; height: 6px; border-radius: 999px; background: var(--lcars-salmon); display: block; opacity: 0.5; }
  .nav-btn:nth-child(2) .icon { background: var(--lcars-peach); }
  .nav-btn:nth-child(3) .icon { background: var(--lcars-gold); }
  .nav-btn:nth-child(4) .icon { background: var(--lcars-blue); }
  .nav-btn:nth-child(5) .icon { background: var(--lcars-lilac); }
  .nav-btn.active { color: var(--accent); }
  .nav-btn.active .icon { opacity: 1; }

  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
  .blink { animation: blink 2.4s infinite; }

  /* HOME / Heute */
  .hero { padding: 0 16px 20px; }
  .hero-card { background: linear-gradient(135deg, var(--accent-dim), var(--surface)); border: 1px solid rgba(239,68,68,0.3); border-radius: 16px; padding: 18px; position: relative; overflow: hidden; }
  .hero-card .label { font-size: 10px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
  .hero-card .greeting { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; }
  .hero-card .sub { font-size: 13px; color: var(--text-dim); margin-top: 4px; }
  .quick-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
  .quick-btn { background: var(--surface-2); border: none; color: var(--text); padding: 14px; border-radius: 999px; font-family: inherit; font-weight: 700; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 10px; justify-content: center; text-transform: uppercase; letter-spacing: 0.04em; }
  .quick-btn .ic { font-size: 22px; }
  .quick-btn:active { background: var(--surface-2); }

  .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); font-weight: 700; padding: 4px 16px 8px; display: flex; justify-content: space-between; align-items: center; }
  .section-title .more { font-size: 11px; color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }

  /* Karten-Reihe (horizontal scroll) */
  .scroll-row { display: flex; gap: 10px; padding: 0 16px 16px; overflow-x: auto; scrollbar-width: none; }
  .scroll-row::-webkit-scrollbar { display: none; }
  .plan-card { flex: 0 0 220px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; cursor: pointer; }
  .plan-card:active { background: var(--surface-2); }
  .plan-card .ic { font-size: 28px; margin-bottom: 8px; }
  .plan-card .name { font-weight: 800; font-size: 14px; letter-spacing: -0.01em; }
  .plan-card .meta { font-size: 11px; color: var(--text-dim); margin-top: 4px; font-family: 'JetBrains Mono', monospace; }
  .plan-card .desc { font-size: 12px; color: var(--text-dim); margin-top: 6px; line-height: 1.4; }

  /* Session-Liste */
  .session-list { padding: 0 16px 16px; display: flex; flex-direction: column; gap: 8px; }
  .session-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; cursor: pointer; display: flex; align-items: center; gap: 12px; }
  .session-card:active { background: var(--surface-2); }
  .session-icon { width: 44px; height: 44px; border-radius: 10px; display: grid; place-items: center; font-size: 22px; flex-shrink: 0; }
  .session-icon.km { background: rgba(239,68,68,0.15); }
  .session-icon.kmh { background: rgba(245,158,11,0.15); }
  .session-icon.strength { background: rgba(59,130,246,0.15); }
  .session-icon.cardio { background: rgba(16,185,129,0.15); }
  .session-icon.mob { background: rgba(168,85,247,0.15); }
  .session-info { flex: 1; min-width: 0; }
  .session-info .name { font-weight: 700; font-size: 14px; }
  .session-info .meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }
  .session-info .notes { font-size: 12px; color: var(--text-dim); margin-top: 4px; font-style: italic; }
  .session-meta-right { text-align: right; font-size: 11px; color: var(--text-faint); }
  .session-meta-right .dur { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--text); font-size: 13px; }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 16px 16px; }
  .stat-tile { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
  .stat-tile .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-faint); font-weight: 700; }
  .stat-tile .val { font-family: 'JetBrains Mono', monospace; font-size: 26px; font-weight: 800; margin-top: 4px; letter-spacing: -0.02em; }
  .stat-tile .sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .stat-tile .val.accent { color: var(--accent); }
  .stat-tile .val.green { color: var(--green); }
  .stat-tile .val.orange { color: var(--orange); }

  .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; padding: 0 16px 16px; }
  .week-cell { aspect-ratio: 1; background: var(--surface-2); border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; }
  .week-cell .wd { font-size: 9px; color: var(--text-faint); text-transform: uppercase; font-weight: 700; }
  .week-cell.done { background: var(--accent-dim); border: 1px solid var(--accent); }
  .week-cell.today { box-shadow: 0 0 0 2px var(--orange); }
  .week-cell .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-faint); }
  .week-cell.done .dot { background: var(--accent); }

  /* TECHNIKEN */
  .tech-search { padding: 0 16px 10px; }
  .tech-search input { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 11px 14px; border-radius: 10px; font-family: inherit; font-size: 14px; }
  .tech-categories { display: flex; gap: 6px; padding: 0 16px 12px; overflow-x: auto; scrollbar-width: none; }
  .tech-categories::-webkit-scrollbar { display: none; }
  .tech-cat-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text-dim); padding: 7px 12px; border-radius: 8px; font-family: inherit; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; text-transform: uppercase; letter-spacing: 0.04em; }
  .tech-cat-btn.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
  .tech-list { padding: 0 16px 20px; display: flex; flex-direction: column; gap: 8px; }
  .tech-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; cursor: pointer; display: flex; gap: 12px; align-items: center; }
  .tech-card:active { background: var(--surface-2); }
  .tech-thumb { width: 60px; height: 60px; background: var(--bg); border-radius: 10px; display: grid; place-items: center; flex-shrink: 0; border: 1px solid var(--border); }
  .tech-thumb svg { width: 50px; height: 50px; }
  .tech-info { flex: 1; min-width: 0; }
  .tech-info .name { font-weight: 800; font-size: 14px; letter-spacing: -0.01em; }
  .tech-info .cat { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 700; margin-top: 2px; }
  .tech-info .short { font-size: 12px; color: var(--text-dim); margin-top: 4px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .tech-fav { font-size: 18px; color: var(--text-faint); cursor: pointer; padding: 4px; }
  .tech-fav.active { color: var(--orange); }

  /* TECHNIK-DETAIL */
  .tech-detail { padding: 0 16px 20px; }
  .tech-detail-header { display: flex; gap: 14px; align-items: flex-start; margin-bottom: 16px; padding-top: 4px; }
  .tech-detail-svg { width: 140px; height: 140px; background: var(--surface); border-radius: 14px; border: 1px solid var(--border); padding: 14px; flex-shrink: 0; }
  .tech-detail-svg svg { width: 100%; height: 100%; }
  .tech-detail-title { flex: 1; }
  .tech-detail-title .cat { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; }
  .tech-detail-title h2 { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; margin-top: 4px; }
  .tech-detail-title .level { display: inline-block; background: var(--surface-2); color: var(--text-dim); padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; margin-top: 8px; letter-spacing: 0.04em; }
  .back-btn { background: var(--lcars-peach); border: none; color: #000; padding: 8px 16px; border-radius: 999px; font-family: inherit; font-size: 12px; font-weight: 700; cursor: pointer; margin: 0 16px 12px; display: inline-flex; align-items: center; gap: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
  .tech-block { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; }
  .tech-block h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); font-weight: 700; margin-bottom: 8px; }
  .tech-block ol, .tech-block ul { padding-left: 18px; }
  .tech-block li { margin-bottom: 6px; font-size: 13px; line-height: 1.5; }
  .tech-block.warn { background: rgba(239,68,68,0.05); border-color: rgba(239,68,68,0.25); }
  .tech-block.warn h3 { color: var(--accent); }
  .tech-block p { font-size: 13px; line-height: 1.5; color: var(--text); }
  .tech-block a { color: var(--blue); text-decoration: none; }

  /* TIMER */
  .timer-screen { padding: 16px; }
  .timer-presets { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .timer-preset { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px; cursor: pointer; text-align: left; }
  .timer-preset:active { background: var(--surface-2); }
  .timer-preset.active { background: var(--accent-dim); border-color: var(--accent); }
  .timer-preset .name { font-weight: 800; font-size: 13px; }
  .timer-preset .desc { font-size: 11px; color: var(--text-dim); margin-top: 4px; font-family: 'JetBrains Mono', monospace; }
  .timer-config { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 16px; }
  .timer-config .row { display: grid; grid-template-columns: 1fr 100px 100px; gap: 10px; align-items: center; margin-bottom: 10px; }
  .timer-config .row:last-child { margin-bottom: 0; }
  .timer-config label { font-size: 12px; font-weight: 600; }
  .timer-config input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 10px; border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-weight: 700; text-align: center; font-size: 14px; }
  .timer-start-btn { width: 100%; background: var(--accent); color: white; border: none; padding: 16px; border-radius: 14px; font-family: inherit; font-weight: 800; font-size: 16px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.08em; }
  .timer-start-btn:active { transform: scale(0.98); }

  /* Timer Running */
  .timer-running-screen { position: fixed; inset: 0; background: var(--bg); z-index: 300; padding: 30px 20px; padding-top: calc(30px + var(--safe-top)); padding-bottom: calc(30px + var(--safe-bot)); display: flex; flex-direction: column; align-items: center; justify-content: space-between; }
  .timer-running-screen.work { background: linear-gradient(180deg, rgba(239,68,68,0.2), var(--bg) 50%); }
  .timer-running-screen.rest { background: linear-gradient(180deg, rgba(16,185,129,0.2), var(--bg) 50%); }
  .timer-running-screen.prep { background: linear-gradient(180deg, rgba(245,158,11,0.2), var(--bg) 50%); }
  .timer-phase { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.2em; color: var(--text-dim); margin-top: 20px; }
  .timer-phase.work { color: var(--accent); }
  .timer-phase.rest { color: var(--green); }
  .timer-phase.prep { color: var(--orange); }
  .timer-bigtime { font-family: 'JetBrains Mono', monospace; font-size: 110px; font-weight: 800; letter-spacing: -0.05em; line-height: 1; }
  .timer-round { font-size: 18px; font-weight: 700; color: var(--text-dim); margin-top: 8px; font-family: 'JetBrains Mono', monospace; }
  .timer-progress { width: 100%; max-width: 320px; height: 8px; background: var(--surface-2); border-radius: 4px; overflow: hidden; }
  .timer-progress-fill { height: 100%; background: var(--accent); transition: width 1s linear; }
  .timer-controls { display: flex; gap: 14px; }
  .timer-ctrl-btn { background: var(--surface-2); border: 1px solid var(--border); color: var(--text); width: 60px; height: 60px; border-radius: 50%; font-size: 22px; cursor: pointer; display: grid; place-items: center; }
  .timer-ctrl-btn.primary { background: var(--accent); color: white; width: 80px; height: 80px; font-size: 28px; border: none; }
  .timer-ctrl-btn:active { transform: scale(0.92); }

  /* SETTINGS */
  .settings-section { margin-bottom: 18px; }
  .settings-section h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); font-weight: 700; margin-bottom: 10px; }
  .theme-options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .theme-opt { background: var(--surface-2); border: none; color: var(--text); padding: 12px 4px; border-radius: 999px; font-family: inherit; font-weight: 700; font-size: 12px; cursor: pointer; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 4px; text-transform: uppercase; }
  .theme-opt .ic { font-size: 20px; }
  .theme-opt.active { background: var(--lcars-orange); color: #000; }
  .settings-btn { width: 100%; background: var(--lcars-gold); border: none; color: #000; padding: 12px; border-radius: 999px; font-family: inherit; font-weight: 700; font-size: 13px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
  .settings-btn:active { background: var(--surface-2); }
  .settings-info { background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; font-size: 12px; color: var(--text-dim); line-height: 1.5; }

  /* MODAL */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
  .modal-bg.show { display: flex; }
  .modal { background: var(--surface); width: 100%; max-width: 500px; border-radius: 28px 28px 0 0; padding: 20px 20px calc(20px + var(--safe-bot)); max-height: 92vh; overflow-y: auto; border-top: 3px solid var(--lcars-orange); }
  @media (min-width: 600px) { .modal-bg { align-items: center; } .modal { border-radius: 28px; max-height: 86vh; } }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 14px; }
  .modal-title { font-weight: 700; font-size: 22px; margin-bottom: 14px; letter-spacing: 0.02em; color: var(--accent); }

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      state.sessions = data.sessions || [];
      state.customPlans = data.customPlans || [];
      state.favTechniques = data.favTechniques || [];
      state.theme = data.theme || 'auto';
    }
  } catch(e) { console.warn('Load failed:', e); }
  applyTheme();
}
function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      sessions: state.sessions,
      customPlans: state.customPlans,
      favTechniques: state.favTechniques,
      theme: state.theme
    }));
  } catch(e) { console.warn('Save failed:', e); }
}

function applyTheme() {
  const theme = state.theme || 'auto';
  document.documentElement.setAttribute('data-theme', theme);
  const isDark = theme === 'dark' ||
                 (theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
  const tc = document.getElementById('themeColor');
  if (tc) tc.setAttribute('content', isDark ? '#000000' : '#d6d2c4');
}

const $ = id => document.getElementById(id);

function fmtDate(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function isToday(d) { return fmtDate(d) === fmtDate(new Date()); }
function addDays(d, n) { const x = new Date(d); x.setDate(x.getDate()+n); return x; }
function escape(s) { return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtTime(sec) {
  const m = Math.floor(sec/60);
  const s = sec%60;
  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}
function getGreeting() {
  const h = new Date().getHours();
  if (h < 5) return 'Späte Stunde,';
  if (h < 11) return 'Guten Morgen,';
  if (h < 14) return 'Hi,';
  if (h < 18) return 'Guten Tag,';
  if (h < 22) return 'Guten Abend,';
  return 'Späte Stunde,';
}

function renderHome() {
  const today = new Date();
  const todayStr = fmtDate(today);
  const todaySessions = state.sessions.filter(s => s.date === todayStr);
  const lastSessions = [...state.sessions].sort((a,b) => b.date.localeCompare(a.date) || b.created - a.created).slice(0, 5);

  // Diese Woche
  const weekStart = new Date(today);
  const dow = weekStart.getDay();
  weekStart.setDate(weekStart.getDate() + (dow === 0 ? -6 : 1 - dow));
  const weekDays = [];
  for (let i = 0; i < 7; i++) weekDays.push(addDays(weekStart, i));
  const weekSessions = state.sessions.filter(s => {
    const d = new Date(s.date);
    return d >= weekStart && d <= addDays(weekStart, 6);
  });

  let html = `
    <div class="hero">
      <div class="hero-card">
        <div class="label">${todaySessions.length > 0 ? '✓ Heute trainiert' : 'Heute'}</div>
        <div class="greeting">${getGreeting()} Kämpfer.</div>
        <div class="sub">${todaySessions.length > 0
          ? `${todaySessions.length} Session${todaySessions.length > 1 ? 's' : ''} geloggt · weiter so`
          : 'Bereit für dein Training?'}</div>
        <div class="quick-actions">
          <button class="quick-btn" id="quickLogBtn"><span>Training loggen</span></button>
          <button class="quick-btn" id="quickTimerBtn"><span>Timer starten</span></button>
        </div>
      </div>
    </div>

    <div class="section-title">Diese Woche</div>
    <div class="week-grid">`;

  weekDays.forEach(d => {
    const ds = fmtDate(d);
    const hasSession = weekSessions.some(s => s.date === ds);
    const today = isToday(d);
    html += `<div class="week-cell ${hasSession ? 'done' : ''} ${today ? 'today' : ''}">
      <div class="wd">${DAYS_DE[d.getDay()]}</div>
      <div style="font-size:14px; font-weight:700; font-family:'JetBrains Mono', monospace">${d.getDate()}</div>
      <div class="dot"></div>
    </div>`;
  });
  html += `</div>`;

  // Plan-Vorschläge
  html += `<div class="section-title">Schnellstart</div>
    <div class="scroll-row">`;
  PLANS.slice(0, 4).forEach(p => {
    html += `<div class="plan-card" data-plan="${p.id}">
      <div class="ic">${p.icon}</div>
      <div class="name">${p.name}</div>
      <div class="meta">${p.duration} Min · ${p.steps.length} Schritte</div>
      <div class="desc">${p.desc}</div>
    </div>`;
  });
  html += `</div>`;

  // Letzte Sessions
  if (lastSessions.length > 0) {
    html += `<div class="section-title">Letzte Sessions</div>
      <div class="session-list">`;
    lastSessions.forEach(s => {
      const t = TYPE_INFO[s.type] || TYPE_INFO.other;
      const d = new Date(s.date);
      const dateLabel = isToday(d) ? 'Heute' : `${DAYS_DE[d.getDay()]}, ${d.getDate()}. ${MONTHS_SHORT[d.getMonth()]}`;
      const intLabel = ['locker','moderat','solide','hart','brutal'][s.intensity - 1] || '';
      html += `<div class="session-card" data-id="${s.id}">
        <div class="session-icon ${t.cls}">${t.icon}</div>
        <div class="session-info">
          <div class="name">${t.name}</div>
          <div class="meta">${dateLabel} · ${intLabel}</div>
          ${s.notes ? `<div class="notes">${escape(s.notes.slice(0, 80))}${s.notes.length > 80 ? '…' : ''}</div>` : ''}
        </div>
        <div class="session-meta-right">
          <div class="dur">${s.duration}m</div>
        </div>
      </div>`;
    });
    html += `</div>`;

  mainEl.innerHTML = html;

    el.addEventListener('click', () => openSession(el.dataset.id));
  });
}

  } else if (state.techCategory !== 'all') {
    filtered = TECHNIQUES.filter(t => t.cat === state.techCategory);

  html += `<div class="tech-list">`;

    b.addEventListener('click', () => { state.techCategory = b.dataset.cat; renderTechniques(); });
  });
  document.querySelectorAll('.tech-card').forEach(el => {
    el.addEventListener('click', e => {

function startTimer() {
  timerState = {
    running: true,
    phase: 'prep',
    round: 1,
    secLeft: state.timerConfig.prep || 1,
    totalSec: state.timerConfig.prep || 1,
    config: { ...state.timerConfig }
  };
  renderTimerRunning();
  timerState.interval = setInterval(timerTick, 1000);
}

function timerTick() {
  if (!timerState || !timerState.running) return;
  timerState.secLeft--;
  if (timerState.secLeft <= 0) {
    nextPhase();
  } else {
    if (timerState.secLeft <= 3 && timerState.secLeft > 0) beep('short');
  }
  updateTimerDisplay();
}

function nextPhase() {
  beep('long');
  const c = timerState.config;
  if (timerState.phase === 'prep') {
    timerState.phase = 'work';
    timerState.secLeft = c.work;
    timerState.totalSec = c.work;
  } else if (timerState.phase === 'work') {
    if (timerState.round >= c.rounds) {
      timerState.running = false;
      clearInterval(timerState.interval);
      finishTimer();
      return;
    }
    if (c.rest > 0) {
      timerState.phase = 'rest';
      timerState.secLeft = c.rest;
      timerState.totalSec = c.rest;
    } else {
      timerState.round++;
      timerState.phase = 'work';
      timerState.secLeft = c.work;
      timerState.totalSec = c.work;
    }
  } else if (timerState.phase === 'rest') {
    timerState.round++;
    timerState.phase = 'work';
    timerState.secLeft = c.work;
    timerState.totalSec = c.work;
  }
  updateTimerDisplay();
}

function finishTimer() {
  beep('finish');
  document.body.removeChild($('timerRunning'));
  alert('Workout fertig! Gut gemacht.');
  // Frage ob loggen
  if (confirm('Möchtest du das Training direkt loggen?')) {
    openSession(null);
    setTimeout(() => {
      const totalMin = Math.round((state.timerConfig.prep + state.timerConfig.rounds * (state.timerConfig.work + state.timerConfig.rest)) / 60);
      $('sDuration').value = Math.max(1, totalMin);
      $('sNotes').value = `Timer: ${state.timerConfig.rounds}×${fmtTime(state.timerConfig.work)} Arbeit, ${fmtTime(state.timerConfig.rest)} Pause`;
    }, 100);
  }
  timerState = null;
}

function renderTimerRunning() {
  const node = document.createElement('div');
  node.id = 'timerRunning';
  node.className = 'timer-running-screen ' + timerState.phase;
  node.innerHTML = `
    <div style="text-align:center">
      <div class="timer-phase ${timerState.phase}" id="trPhase">${getPhaseLabel(timerState.phase)}</div>
      <div class="timer-bigtime" id="trTime">${fmtTime(timerState.secLeft)}</div>
      <div class="timer-round" id="trRound">Runde ${timerState.round} / ${timerState.config.rounds}</div>
    </div>
    <div class="timer-progress"><div class="timer-progress-fill" id="trProgress" style="width:100%"></div></div>
    <div class="timer-controls">
      <button class="timer-ctrl-btn" id="trSkip">⏭</button>
      <button class="timer-ctrl-btn primary" id="trPause">⏸</button>
      <button class="timer-ctrl-btn" id="trStop">✕</button>
    </div>
  `;
  document.body.appendChild(node);
  $('trSkip').addEventListener('click', () => { nextPhase(); });
  $('trPause').addEventListener('click', () => {
    if (timerState.running) {
      timerState.running = false;
      clearInterval(timerState.interval);
      $('trPause').textContent = '▶';
    } else {
      timerState.running = true;
      timerState.interval = setInterval(timerTick, 1000);
      $('trPause').textContent = '⏸';
    }
  });
  $('trStop').addEventListener('click', () => {
    if (confirm('Timer abbrechen?')) {
      clearInterval(timerState.interval);
      document.body.removeChild($('timerRunning'));
      timerState = null;
    }
  });
}

function updateTimerDisplay() {
  if (!$('timerRunning')) return;
  $('timerRunning').className = 'timer-running-screen ' + timerState.phase;
  $('trPhase').className = 'timer-phase ' + timerState.phase;
  $('trPhase').textContent = getPhaseLabel(timerState.phase);
  $('trTime').textContent = fmtTime(timerState.secLeft);
  $('trRound').textContent = `Runde ${timerState.round} / ${timerState.config.rounds}`;
  const pct = (timerState.secLeft / timerState.totalSec) * 100;
  $('trProgress').style.width = pct + '%';
}

function getPhaseLabel(phase) {
  return phase === 'prep' ? 'Bereit machen' : phase === 'work' ? 'GO!' : 'Pause';
}

// Beep mit Web Audio
let audioCtx = null;
function beep(type) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g);
    g.connect(audioCtx.destination);
    if (type === 'short') {
      o.frequency.value = 600;
      g.gain.setValueAtTime(0.3, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
      o.start();
      o.stop(audioCtx.currentTime + 0.15);
    } else if (type === 'long') {
      o.frequency.value = 880;
      g.gain.setValueAtTime(0.4, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
      o.start();
      o.stop(audioCtx.currentTime + 0.4);
    } else if (type === 'finish') {
      [523, 659, 784, 1047].forEach((freq, i) => {
        const o2 = audioCtx.createOscillator();
        const g2 = audioCtx.createGain();
        o2.connect(g2); g2.connect(audioCtx.destination);
        o2.frequency.value = freq;
        g2.gain.setValueAtTime(0.3, audioCtx.currentTime + i * 0.15);
        g2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.15 + 0.3);
        o2.start(audioCtx.currentTime + i * 0.15);
        o2.stop(audioCtx.currentTime + i * 0.15 + 0.3);
      });
    }
  } catch(e) {}
}

// =============================================================
// RENDER: STATISTIK
// =============================================================
function renderStats() {
  // 4 Wochen Statistik
  const today = new Date();
  const last30Days = [];
  for (let i = 29; i >= 0; i--) last30Days.push(addDays(today, -i));
  const dataMap = {};
  last30Days.forEach(d => dataMap[fmtDate(d)] = 0);
  let totalMin = 0, totalSessions = 0, kmSessions = 0;
  state.sessions.forEach(s => {
    if (dataMap[s.date] !== undefined) {
      dataMap[s.date] += s.duration;
      totalMin += s.duration;
      totalSessions++;
      if (s.type === 'km' || s.type === 'kmh') kmSessions++;
    }
  });

  // Streak: aktuelle Serie an Tagen mit Training
  let streak = 0;
  for (let i = 0; i < 365; i++) {
    const d = addDays(today, -i);
    if (state.sessions.some(s => s.date === fmtDate(d))) streak++;
    else if (i > 0) break;
  }

  const max = Math.max(60, ...Object.values(dataMap));
  let html = `<div class="section-title">Statistik – Letzte 30 Tage</div>
    <div class="stats-grid">
      <div class="stat-tile"><div class="lbl">Sessions</div><div class="val accent">${totalSessions}</div><div class="sub">in 30 Tagen</div></div>
      <div class="stat-tile"><div class="lbl">Trainingszeit</div><div class="val green">${Math.round(totalMin/60)}h ${totalMin%60}m</div><div class="sub">total</div></div>
      <div class="stat-tile"><div class="lbl">Krav Maga</div><div class="val accent">${kmSessions}</div><div class="sub">Sessions</div></div>
      <div class="stat-tile"><div class="lbl">Aktuelle Serie</div><div class="val orange">${streak} ${streak === 1 ? 'Tag' : 'Tage'}</div><div class="sub">in Folge</div></div>
    </div>
    <div style="padding: 0 16px; margin-bottom: 16px">
      <div style="background: var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px">
        <div style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); font-weight: 700; margin-bottom: 10px">Verlauf (Min/Tag)</div>
        <div style="height:100px; display:flex; align-items:flex-end; gap:1px">`;
  last30Days.forEach(d => {
    const min = dataMap[fmtDate(d)];
    const h = min > 0 ? Math.max(4, (min / max) * 100) : 2;
    const color = min > 0 ? 'var(--accent)' : 'var(--surface-2)';
    html += `<div style="flex:1; height:${h}%; background:${color}; border-radius:2px 2px 0 0" title="${fmtDate(d)}: ${min} min"></div>`;
  });
  html += `</div>
        <div style="display:flex; justify-content:space-between; font-size:9px; color:var(--text-faint); margin-top:6px; font-family:'JetBrains Mono', monospace">
          <span>vor 30 Tagen</span><span>heute</span>
        </div>
      </div>
    </div>`;

  // Typen-Verteilung
  const typeMap = {};
  state.sessions.forEach(s => {
    typeMap[s.type] = (typeMap[s.type] || 0) + 1;
  });
  if (Object.keys(typeMap).length > 0) {
    html += `<div class="section-title">Trainingsarten</div>
      <div style="padding:0 16px 16px">`;
    const total = Object.values(typeMap).reduce((a,b)=>a+b, 0);
    Object.entries(typeMap).sort((a,b)=>b[1]-a[1]).forEach(([type, count]) => {
      const t = TYPE_INFO[type] || TYPE_INFO.other;
      const pct = Math.round((count/total)*100);
      html += `<div style="background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px 14px; margin-bottom:6px; display:flex; align-items:center; gap:12px">
        <div class="session-icon ${t.cls}" style="width:38px; height:38px; font-size:18px">${t.icon}</div>
        <div style="flex:1">
          <div style="font-weight:700; font-size:13px">${t.name}</div>
          <div style="height:6px; background:var(--surface-2); border-radius:3px; margin-top:6px; overflow:hidden">
            <div style="height:100%; width:${pct}%; background:var(--accent); border-radius:3px"></div>
          </div>
        </div>
        <div style="font-family:'JetBrains Mono', monospace; font-weight:700; font-size:14px">${count}<span style="color:var(--text-faint); font-size:10px; margin-left:3px">${pct}%</span></div>
      </div>`;
    });
    html += `</div>`;
  }

  mainEl.innerHTML = html;
}

// =============================================================
// SESSION-MODAL
// =============================================================
function openSession(id) {
  state.editingSession = id;
  if (id) {
    const s = state.sessions.find(x => x.id === id);
    if (!s) return;
    $('sessionTitle').textContent = 'Training bearbeiten';
    state.selectedType = s.type;
    state.selectedIntensity = s.intensity;
    $('sDate').value = s.date;
    $('sDuration').value = s.duration;
    $('sNotes').value = s.notes || '';
    $('sDelete').style.display = 'block';
  } else {
    $('sessionTitle').textContent = 'Training loggen';
    state.selectedType = 'km';
    state.selectedIntensity = 3;
    $('sDate').value = fmtDate(new Date());
    $('sDuration').value = 60;
    $('sNotes').value = '';
    $('sDelete').style.display = 'none';
  }
  document.querySelectorAll('.type-pill').forEach(b => b.classList.toggle('active', b.dataset.type === state.selectedType));
  document.querySelectorAll('.int-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.i) === state.selectedIntensity));
  $('sessionBg').classList.add('show');
}
function closeSession() { $('sessionBg').classList.remove('show'); state.editingSession = null; }

function saveSession() {
  const date = $('sDate').value;
  if (!date) { alert('Bitte Datum wählen'); return; }
  const duration = parseInt($('sDuration').value);
  if (!duration || duration < 1) { alert('Bitte Dauer eingeben'); return; }
  const data = {
    id: state.editingSession || ('s_' + Date.now()),
    date,
    type: state.selectedType,
    duration,
    intensity: state.selectedIntensity,
    notes: $('sNotes').value.trim(),
    created: Date.now()
  };
  if (state.editingSession) {
    const idx = state.sessions.findIndex(s => s.id === state.editingSession);
    state.sessions[idx] = { ...state.sessions[idx], ...data };
  } else {
    state.sessions.unshift(data);
  }
  saveData();
  closeSession();
  render();
}

function deleteSession() {
  if (!state.editingSession) return;
  if (!confirm('Diese Session löschen?')) return;
  state.sessions = state.sessions.filter(s => s.id !== state.editingSession);
  saveData();
  closeSession();
  render();
}

// =============================================================
// RENDER ROUTER
// =============================================================
function render() {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === state.tab));
  if (state.tab === 'home') renderHome();
  else if (state.tab === 'techniques') renderTechniques();
  else if (state.tab === 'plans') renderPlans();
  else if (state.tab === 'timer') renderTimer();
  else if (state.tab === 'stats') renderStats();
}

// =============================================================
// BINDINGS
// =============================================================
document.querySelectorAll('.nav-btn').forEach(b => {
  b.addEventListener('click', () => {
    state.tab = b.dataset.tab;
    if (state.tab !== 'techniques') state.currentTechId = null;
    if (state.tab !== 'plans') state.currentPlanId = null;
    render();
  });
});
$('settingsBtn').addEventListener('click', openSettings);

function openSettings() {
  // Stats aktualisieren
  $('settingsStats').textContent = `${state.sessions.length} Sessions · ${state.favTechniques.length} Favoriten-Techniken · ${state.customPlans.length} eigene Pläne`;
  // Aktives Theme markieren
  document.querySelectorAll('.theme-opt').forEach(b => b.classList.toggle('active', b.dataset.theme === (state.theme || 'auto')));
  $('settingsBg').classList.add('show');
}
function closeSettings() { $('settingsBg').classList.remove('show'); }

// Theme-Wechsel
document.querySelectorAll('.theme-opt').forEach(b => {
  b.addEventListener('click', () => {
    state.theme = b.dataset.theme;
    applyTheme();
    saveData();
    document.querySelectorAll('.theme-opt').forEach(x => x.classList.toggle('active', x === b));
  });
});

// Settings-Modal close + Backup-Buttons
$('settingsCloseBtn').addEventListener('click', closeSettings);
$('settingsBg').addEventListener('click', e => { if (e.target === $('settingsBg')) closeSettings(); });
$('settingsExportBtn').addEventListener('click', exportBackup);
$('settingsImportBtn').addEventListener('click', importBackup);

// Bei Theme "auto" auf Systemwechsel hören
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  if ((state.theme || 'auto') === 'auto') applyTheme();
});

function exportBackup() {
  const backup = {
    app: 'train',
    version: 1,
    exportedAt: new Date().toISOString(),
    sessions: state.sessions,
    customPlans: state.customPlans,
    favTechniques: state.favTechniques
  };
  const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `train_backup_${fmtDate(new Date())}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importBackup() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'application/json,.json';
  input.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.app && data.app !== 'train') {
          alert('Diese Backup-Datei gehört zu einer anderen App ("' + data.app + '").');
          return;
        }
        if (!Array.isArray(data.sessions)) {
          alert('Die Datei sieht nicht wie ein Train-Backup aus.');
          return;
        }
        const sCount = (data.sessions || []).length;
        const fCount = (data.favTechniques || []).length;
        const pCount = (data.customPlans || []).length;
        const msg = `Backup enthält:\n• ${sCount} Training-Sessions\n• ${fCount} Favoriten-Techniken\n• ${pCount} eigene Pläne\n\nAktuell:\n• ${state.sessions.length} Sessions\n\nOK = Alles ÜBERSCHREIBEN\nAbbrechen = Nichts tun`;
        if (!confirm(msg)) return;
        state.sessions = data.sessions || [];
        state.customPlans = data.customPlans || [];
        state.favTechniques = data.favTechniques || [];
        saveData();
        render();
        alert('✓ Backup erfolgreich geladen!');
      } catch(err) {
        alert('Fehler beim Laden: ' + err.message);
      }
    };
    reader.readAsText(file);
  });
  input.click();
}

// Session-Modal
document.querySelectorAll('.type-pill').forEach(b => {
  b.addEventListener('click', () => {
    state.selectedType = b.dataset.type;
    document.querySelectorAll('.type-pill').forEach(x => x.classList.toggle('active', x === b));
  });
});
document.querySelectorAll('.int-btn').forEach(b => {
  b.addEventListener('click', () => {
    state.selectedIntensity = parseInt(b.dataset.i);
    document.querySelectorAll('.int-btn').forEach(x => x.classList.toggle('active', x === b));
  });
});
$('sCancel').addEventListener('click', closeSession);
$('sSave').addEventListener('click', saveSession);
$('sDelete').addEventListener('click', deleteSession);
$('sessionBg').addEventListener('click', e => { if (e.target === $('sessionBg')) closeSession(); });

// Init
loadData();
render();
</script>
